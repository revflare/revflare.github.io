<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | revFlare Beta Application</title>
    <meta name="description" content="Thank you for applying to the revFlare beta program.">
    
    <!-- Favicon -->
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        .thank-you-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(180deg, var(--bg-color), rgba(19, 20, 27, 0.9)), 
                radial-gradient(circle at 20% 80%, rgba(146, 21, 246, 0.2), transparent 30%),
                radial-gradient(circle at 80% 20%, rgba(255, 108, 0, 0.2), transparent 30%);
        }
        
        .thank-you-icon {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .thank-you-content {
            max-width: 600px;
            background: var(--card-gradient);
            border-radius: var(--border-radius-md);
            padding: 3rem;
            border: 1px solid var(--border-color);
        }
        
        .home-link {
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <div class="thank-you-content">
            <div class="thank-you-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Thank You!</h1>
            <p>Your application for the revFlare beta program has been submitted successfully.</p>
            <p>Our team will review your application and get back to you shortly. We're excited about the possibility of working with you!</p>
            <div class="home-link">
                <a href="index.html" class="btn btn-primary">Back to Homepage</a>
            </div>
        </div>
    </div>
</body>
</html>
